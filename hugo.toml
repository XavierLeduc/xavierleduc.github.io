baseURL = "https://xavierleduc.github.io/"
locale = "fr-fr"
title = "Xavier LEDUC"
theme = "vintage-web-hugo-theme"

[pagination]
  pagerSize = 10
  path = "page"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

ignoreLogs = ['warning-goldmark-raw-html']

[taxonomies]
  tag = "tags"
  category = "categories"

[[menu.main]]
  name = "Accueil"
  url = "/"
  weight = 10

[[menu.main]]
  name = "Trail"
  url = "/posts/"
  weight = 20

[params]
  description = "Blog personnel de Xavier LEDUC : randonnée, cybersécurité et autres passions"
  author = "Xavier LEDUC"

  show_browser_chrome = true
  show_status_bar = true
  show_sidebar = true
  show_welcome_message = true
  welcome_message = "Bienvenue sur le blog de Xavier LEDUC !"

  show_featured_sections = true
  show_stats = true
  show_retro_elements = true
  show_sharing = true

  show_retro_footer = true
  show_build_info = false

  show_sidebar_stats = true
  show_retro_sidebar = true
